name: Deploy Infra (Bicep)

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC ログイン
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ vars.AZURE_RG }}
          template: ./infra/main.bicep
          parameters: >-
            prefix=${{ vars.RESOURCE_PREFIX }}
            existingCosmosAccountName=${{ vars.EXISTING_COSMOS_ACCOUNT }}
            existingCosmosDatabaseName=${{ vars.EXISTING_COSMOS_DATABASE }}
            openAiEndpoint=${{ vars.AZURE_OPENAI_ENDPOINT }}
            openAiDeployment=${{ vars.AZURE_OPENAI_DEPLOYMENT }}
            foundryAgentUrlSummary=${{ vars.FOUNDRY_AGENT_URL_SUMMARY }}
            foundryAgentUrlQuiz=${{ vars.FOUNDRY_AGENT_URL_QUIZ }}
            aadClientId=${{ vars.AAD_CLIENT_ID }}
            aadClientSecret=${{ secrets.AAD_CLIENT_SECRET }}
          deploymentMode: Incremental
          deploymentName: ms-learning-${{ github.run_number }}
          failOnStdErr: false
