name: Deploy Frontend (Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write   # PR プレビュー環境のコメント用

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # SWA に紐づくデプロイトークン (リソース作成時に Azure 側で発行)
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: ${{ github.event_name == 'pull_request' && 'upload' || 'upload' }}
          app_location: "frontend"
          # API は linkedBackend で別 Function App を使うため空
          api_location: ""
          output_location: "dist"
          skip_api_build: true
