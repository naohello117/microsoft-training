name: Deploy Backend (Functions)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "!backend/local.settings.json"
      - "!backend/__pycache__/**"
      - "!backend/**/__pycache__/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.11"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "backend"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (build target)
        run: |
          cd backend
          python -m pip install --upgrade pip
          # remote build を有効にしているため、ここでは依存解決の検証のみ行う
          pip install -r requirements.txt --target=".python_packages/lib/site-packages" \
            --only-binary=:all: --platform manylinux2014_x86_64 --python-version 3.11 || \
            pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
